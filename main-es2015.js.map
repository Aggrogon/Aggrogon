<div class="navbar">
   <div class="dropdown">
      <button class="dropbtn">Menu
         <i class="fa fa-caret-down"></i>
      </button>
      <div class="dropdown-content">
         <a href="#" (click)="saveMap()">save map</a>
         <a href="#"  (click)="loadMap()">load map</a>
         <a href="#"  class="removeButton" (click)="clear()">Remove All!</a>
      </div>
   </div>
   <a href="#" >Map History:</a>
   <a href="#"  *ngFor="let breadCrum of breadCrumList; let i = index;"
      (click)="selectBreadCrum(i)">{{breadCrumList[i].title}}</a>
</div>
